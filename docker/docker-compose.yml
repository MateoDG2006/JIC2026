services:
  chembl-init:
    build: ./chembl-init
    volumes:
      - chembl_db:/data/chembl
    environment:
      CHEMBL_VERSION: "37"
    profiles: ["setup"]

  toxgnn:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - chembl_db:/data/chembl:ro
      - ../data:/app/data
      - ../outputs:/app/outputs
      - ../notebooks:/app/notebooks
    environment:
      CHEMBL_BACKEND: sqlite
      CHEMBL_DB_PATH: /data/chembl/chembl_37.db
      CHEMBL_VERSION: "37"
    working_dir: /app

volumes:
  chembl_db:
    name: jic2026_chembl_db
