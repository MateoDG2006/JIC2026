<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GNN-Tox Viewer{% endblock %}</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tokens.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/toast.js"></script>
    <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="app-body">
    <div class="bg-ambient" aria-hidden="true"></div>
    <div id="toast-stack" class="toast-stack" aria-live="polite" aria-relevant="additions"></div>
    <header class="nav" id="nav">
        <div class="nav-in">
            <a class="brand" href="/"><span class="dot"></span>GNN-Tox</a>
            <nav class="nav-links" aria-label="Principal">
                <a class="link" href="/">Inicio</a>
                <a class="link{% if active_nav == 'viewer' %} active{% endif %}" href="/visor">Visor</a>
                <button type="button" class="theme-btn" id="themeBtn" aria-label="Cambiar tema">
                    <i data-lucide="moon" class="moon" aria-hidden="true"></i>
                    <i data-lucide="sun" class="sun" aria-hidden="true"></i>
                </button>
            </nav>
        </div>
    </header>

    <main class="container wrap">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        <div class="wrap footer-in">
            <p>Proyecto JIC 2026 — GNN-GIN + XAI para toxicidad de agroquímicos</p>
            <p class="note">Universidad Tecnológica de Panamá</p>
        </div>
    </footer>

    <script>
      (function () {
        const nav = document.getElementById("nav");
        if (nav) {
          const onScroll = () => nav.classList.toggle("scrolled", window.scrollY > 12);
          onScroll();
          window.addEventListener("scroll", onScroll, { passive: true });
        }
        if (window.lucide) lucide.createIcons();
      })();
    </script>
    <script src="/static/js/glass-combo.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
