<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GNN-Tox Viewer{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">GNN-Tox Viewer</a>
        <span class="nav-subtitle">Prediccion de Toxicidad con GNN-GIN + XAI</span>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <p>Proyecto JIC 2026 &mdash; GNN + XAI para Toxicidad de Agroquimicos en Panama</p>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
