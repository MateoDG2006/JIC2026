<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GNN-Tox Viewer{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">GNN-Tox</a>
        <div class="nav-links">
            <a href="/" class="nav-link{% if active_nav == 'viewer' %} active{% endif %}">Visor GNN</a>
            <a href="/eda" class="nav-link{% if active_nav == 'eda' %} active{% endif %}">Exploración</a>
            <a href="/chembl/models" class="nav-link{% if active_nav == 'models' %} active{% endif %}">Modelos</a>
            <a href="/panama/toxicity" class="nav-link{% if active_nav == 'toxicity' %} active{% endif %}">Toxicidad</a>
            <a href="/panama/models" class="nav-link{% if active_nav == 'comparison' %} active{% endif %}">Comparativa</a>
            <a href="/panama/map" class="nav-link{% if active_nav == 'map' %} active{% endif %}">Mapa Panamá</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <p>Proyecto JIC 2026 &mdash; GNN-GIN/XAI + ChEMBL + Panamá</p>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
