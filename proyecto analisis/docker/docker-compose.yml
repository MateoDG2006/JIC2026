services:
  chembl-init:
    build: ./chembl-init
    volumes:
      - chembl_data:/data/chembl
      - ../config/config.yaml:/config/config.yaml:ro
    environment:
      CONFIG_PATH: /config/config.yaml
      CHEMBL_DB_PATH: /data/chembl/chembl_37.db
    profiles: ["setup"]

  chembl-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    volumes:
      - chembl_data:/data/chembl:ro
    ports:
      - "8765:8765"
    environment:
      CHEMBL_DB_PATH: /data/chembl/chembl_37.db
    restart: unless-stopped

volumes:
  chembl_data:
    external: true
    name: jic2026_chembl_db
