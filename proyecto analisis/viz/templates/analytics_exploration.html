{% extends "base.html" %}

{% block title %}Exploración ChEMBL — Analytics{% endblock %}

{% block head %}
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
{% endblock %}

{% block content %}
<section class="hero">
    <h1>Exploración de datos ChEMBL</h1>
    <p class="lead">EDA interactivo del corpus de bioactividad panameño</p>
</section>

<section class="card analytics-controls">
    <div class="filter-row">
        <label for="eda-variable">Variable</label>
        <select id="eda-variable"></select>
        <label for="eda-family">Familia</label>
        <select id="eda-family"><option value="ALL">Todas</option></select>
        <label for="eda-mw-min">MW mín</label>
        <input type="number" id="eda-mw-min" step="10" />
        <label for="eda-mw-max">MW máx</label>
        <input type="number" id="eda-mw-max" step="10" />
        <button type="button" class="btn btn-primary" id="eda-refresh">Actualizar</button>
    </div>
</section>

<div id="loading-overlay" class="loading-overlay" hidden>
    <div class="spinner"></div>
    <p>Cargando exploración…</p>
</div>

<section class="chart-grid">
    <div id="chart-hist" class="chart-panel card"></div>
    <div id="chart-box" class="chart-panel card"></div>
    <div id="chart-corr" class="chart-panel card"></div>
    <div id="chart-scatter" class="chart-panel card"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/analytics_exploration.js"></script>
{% endblock %}
